<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KAL · Case Care</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f5f7; --surface:#ffffff; --surface-2:#fafafa; --surface-3:#f0f0f2;
  --surface-glass:rgba(255,255,255,0.78);
  --line:#e5e5e7; --line-strong:#d2d2d7;
  --ink:#1d1d1f; --ink-2:#424245; --ink-3:#6e6e73; --ink-4:#8e8e93;
  --blue:#0071e3; --blue-soft:#e8f1fc;
  --indigo:#5e5ce6; --indigo-soft:#ecebfb;
  --amber:#b25e09; --amber-bg:#fff4e0; --amber-mark:#f5a524;
  --green:#0a7d3b; --green-bg:#e6f5ec; --green-mark:#34c759;
  --red:#b3261e; --red-bg:#fdecea; --red-mark:#d70015;
  --purple:#5b3aa8; --purple-bg:#efeaf9;
  --neutral-mark:#a1a1a6;
  --accent:#0071e3;
  --ui:"Inter",-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  --num:"JetBrains Mono",ui-monospace,SFMono-Regular,monospace;
  --row-pad-y:10px; --kpi-pad:16px 18px 18px; --section-gap:22px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--ui);font-size:13.5px;-webkit-font-smoothing:antialiased}
body{line-height:1.45}
button{font-family:inherit}

/* ── Topbar ─────────────────────────────────────────── */
.topbar-wrap{
  position:sticky;top:0;z-index:50;
  background:var(--surface-glass);
  backdrop-filter:saturate(180%) blur(18px);
  -webkit-backdrop-filter:saturate(180%) blur(18px);
  border-bottom:1px solid var(--line);
}
.topbar{
  max-width:1440px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 28px;gap:16px;
  position:relative;
}
.brand{display:flex;align-items:center;gap:10px}
.brand-title{font-weight:600;font-size:14.5px;letter-spacing:-.01em}
.brand-sub{font-size:11px;color:var(--ink-3);margin-top:1px}
.meta{display:flex;align-items:center;gap:12px;font-size:11.5px;color:var(--ink-3)}
.meta .dot{width:6px;height:6px;border-radius:50%;background:var(--green-mark);display:inline-block;margin-right:5px}
#reload-btn{
  border:1px solid var(--line);background:var(--surface);
  padding:5px 12px;border-radius:7px;font-size:12px;font-weight:500;
  color:var(--ink-2);cursor:pointer;
}
#reload-btn:hover{border-color:var(--line-strong)}

/* ── Controls bar ───────────────────────────────────── */
.controls-bar{
  max-width:1440px;margin:0 auto;
  padding:8px 28px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;
  border-bottom:1px solid var(--line);background:var(--surface-2);
}
.ctrl-group{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-3)}
.ctrl-group label{font-weight:500;white-space:nowrap}
.seg{display:inline-flex;background:rgba(0,0,0,.05);border-radius:8px;padding:2px;gap:1px}
.seg button{
  border:0;background:transparent;padding:4px 11px;
  font-size:12px;font-weight:500;color:var(--ink-2);
  border-radius:6px;cursor:pointer;white-space:nowrap;
}
.seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06),0 0 0 .5px rgba(0,0,0,.04)}
.ctrl-sep{width:1px;height:20px;background:var(--line);margin:0 4px}

/* ── App body ───────────────────────────────────────── */
.app{max-width:1440px;margin:0 auto;padding:18px 28px 64px}

/* ── KPI grid ───────────────────────────────────────── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.kpi{
  position:relative;background:var(--surface);
  border:1px solid var(--line);border-radius:10px;
  padding:var(--kpi-pad);min-height:110px;
  display:flex;flex-direction:column;
}
.kpi .label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--ink-3)}
.kpi .value{font-family:var(--num);font-size:30px;font-weight:600;line-height:1;letter-spacing:-.02em;margin-top:6px}
.kpi .sub{margin-top:6px;font-size:11.5px;color:var(--ink-3);line-height:1.35}
.kpi.alert .value{color:var(--red)}
.kpi.warn .value{color:var(--amber)}
.kpi.good .value{color:var(--green)}

/* ── Panel ──────────────────────────────────────────── */
.panel{background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:clip;margin-bottom:var(--section-gap)}
.panel-head{
  padding:12px 18px;border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;
}
.panel-head h3{margin:0;font-size:13.5px;font-weight:600;letter-spacing:-.01em}
.panel-head .meta-r{font-size:11.5px;color:var(--ink-3)}

/* ── Section title ──────────────────────────────────── */
.section-title{
  display:flex;align-items:flex-end;justify-content:space-between;
  margin:var(--section-gap) 0 10px;
}
.section-title h2{
  margin:0;font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:.09em;color:var(--ink-3);
}
.accent-rule{height:2px;width:32px;background:var(--accent);border-radius:2px;margin-bottom:7px}

/* ── Bucket tabs ────────────────────────────────────── */
.bucket-tabs{display:inline-flex;background:rgba(0,0,0,.05);border-radius:9px;padding:3px;gap:2px}
.bucket-tab{
  border:0;background:transparent;padding:5px 14px;
  font-size:12px;font-weight:500;color:var(--ink-2);
  border-radius:6px;cursor:pointer;white-space:nowrap;
}
.bucket-tab.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06),0 0 0 .5px rgba(0,0,0,.04)}
.bucket-tab .bct{font-size:10px;color:var(--ink-4);margin-left:4px;font-family:var(--num)}
.bucket-tab.on .bct{color:var(--ink-3)}

/* ── Table ──────────────────────────────────────────── */
table.t{width:100%;border-collapse:collapse;font-size:12.5px}
table.t th{
  text-align:left;font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);
  padding:9px 14px;border-bottom:1px solid var(--line);
  background:var(--surface-2);white-space:nowrap;
  position:sticky;top:52px;z-index:10;cursor:pointer;user-select:none;
}
table.t th:hover{color:var(--ink-2)}
table.t td{padding:var(--row-pad-y) 14px;border-bottom:1px solid var(--line);vertical-align:middle}
table.t tbody tr:last-child td{border-bottom:0}
table.t tbody tr:hover td{background:var(--surface-3)}
td.num,th.num{text-align:right;font-family:var(--num);font-variant-numeric:tabular-nums;white-space:nowrap}
td.name{font-weight:500}

.case-cell .case-name{font-weight:500;color:var(--ink);line-height:1.25}
.case-cell .case-cm{font-size:11px;color:var(--ink-4);margin-top:2px}

/* Row states */
tr.row-alert td{background:#fff5f4}
tr.row-alert td:first-child{box-shadow:inset 3px 0 0 var(--red-mark)}
tr.row-warn td{background:#fffaf0}
tr.row-warn td:first-child{box-shadow:inset 3px 0 0 var(--amber-mark)}
tr.row-good td{background:#f1faf3}
tr.row-good td:first-child{box-shadow:inset 3px 0 0 var(--green-mark)}

/* ── Flags / badges ─────────────────────────────────── */
.flag{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 7px;font-size:10.5px;font-weight:600;
  border-radius:999px;text-transform:uppercase;letter-spacing:.04em;
  white-space:nowrap;
}
.flag.red{background:var(--red-bg);color:var(--red)}
.flag.amber{background:var(--amber-bg);color:var(--amber)}
.flag.green{background:var(--green-bg);color:var(--green)}
.flag.blue{background:var(--blue-soft);color:var(--blue)}
.flag.gray{background:var(--surface-3);color:var(--ink-3)}
.flag.purple{background:var(--purple-bg);color:var(--purple)}
.flag.indigo{background:var(--indigo-soft);color:var(--indigo)}
td.flagcol .stack{display:flex;flex-direction:column;align-items:flex-start;gap:3px}

/* ── Dropdowns ──────────────────────────────────────── */
.jdrop{
  border:1px solid var(--line);background:var(--surface);
  color:var(--ink-3);font-family:var(--ui);font-size:11.5px;
  padding:3px 6px;border-radius:5px;cursor:pointer;
  min-width:118px;outline:none;
  transition:border-color .12s,color .12s;
}
.jdrop:focus{border-color:var(--blue)}
.jdrop.set{color:var(--ink);font-weight:500}
/* Liability color coding */
.jdrop[data-field="liability"][data-val="Accepted"]{color:var(--green);border-color:var(--green-mark)}
.jdrop[data-field="liability"][data-val="Denied"]{color:var(--red);border-color:var(--red-mark)}
.jdrop[data-field="liability"][data-val="No Coverage"]{color:var(--red)}
.jdrop[data-field="liability"][data-val="Pending"],.jdrop[data-field="liability"][data-val="Under Investigation"]{color:var(--amber);border-color:var(--amber-mark)}
.jdrop[data-field="liability"][data-val="Comparative Fault"]{color:var(--indigo)}
/* HI color coding */
.jdrop[data-field="hi"][data-val="None"]{color:var(--red)}
.jdrop[data-field="hi"][data-val="Medicare"],.jdrop[data-field="hi"][data-val="Medi-Cal"],.jdrop[data-field="hi"][data-val="Kaiser"]{color:var(--amber)}
.jdrop[data-field="hi"][data-val="Private"],.jdrop[data-field="hi"][data-val="ERISA / Employer"]{color:var(--green)}
/* Policy color coding */
.jdrop[data-field="policy3p"][data-val="Uninsured / Prop 213"]{color:var(--red);font-weight:600}
.jdrop[data-field="policy3p"][data-val="15/30"],.jdrop[data-field="policy3p"][data-val="30/60"]{color:var(--amber)}
.jdrop[data-field="policy3p"][data-val="250k–1M"],.jdrop[data-field="policy3p"][data-val="1M+"]{color:var(--green)}
/* UIM color coding */
.jdrop[data-field="uim"][data-val="None"]{color:var(--red)}
.jdrop[data-field="uim"][data-val="250k–1M"],.jdrop[data-field="uim"][data-val="1M+"]{color:var(--green)}

/* ── Notes count pill ───────────────────────────────── */
.notes-pill{
  display:inline-flex;align-items:center;
  font-family:var(--num);font-size:11.5px;font-weight:600;
  color:var(--ink-3);
}
.notes-pill.has{color:var(--ink-2)}

/* ── Loading / empty states ─────────────────────────── */
.loading{text-align:center;padding:40px;color:var(--ink-3);font-size:13px}
.empty{text-align:center;padding:32px;color:var(--ink-4);font-size:12.5px}

/* ── Briefing bar ───────────────────────────────────── */
.briefing{
  background:var(--surface);border:1px solid var(--line);
  border-left:3px solid var(--accent);border-radius:12px;
  padding:12px 16px;margin-bottom:16px;
  display:flex;align-items:center;gap:20px;flex-wrap:wrap;
}
.briefing .b-item{
  font-size:12.5px;color:var(--ink-2);
  display:flex;gap:7px;align-items:center;
}
.briefing .b-marker{
  font-family:var(--num);font-size:12.5px;font-weight:700;
  padding:1px 7px;border-radius:4px;
}
.b-item.red .b-marker{background:var(--red-bg);color:var(--red)}
.b-item.amber .b-marker{background:var(--amber-bg);color:var(--amber)}
.b-item.blue .b-marker{background:var(--blue-soft);color:var(--blue)}
.b-item.green .b-marker{background:var(--green-bg);color:var(--green)}

/* ── Days ago coloring ───────────────────────────────── */
.days-ago.stale{color:var(--red);font-weight:600}
.days-ago.warn{color:var(--amber);font-weight:500}

@media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<!-- TOPBAR -->

</div>

<!-- APP BODY -->
<div class="app">

  <!-- BRIEFING -->
  <div class="briefing" id="briefing-bar" style="display:none">
    <span style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--ink-3);white-space:nowrap">Today's Flags</span>
    <div id="briefing-items" style="display:flex;gap:16px;flex-wrap:wrap"></div>
  </div>

  <!-- KPI ROW -->
  <div class="kpi-grid">
    <div class="kpi" id="kpi-intakes">
      <div class="label">New Intakes</div>
      <div class="value" id="kv-intakes">—</div>
      <div class="sub" id="ks-intakes">within window</div>
    </div>
    <div class="kpi" id="kpi-treating">
      <div class="label">In Treatment</div>
      <div class="value" id="kv-treating">—</div>
      <div class="sub" id="ks-treating">active treating cases</div>
    </div>
    <div class="kpi" id="kpi-stale">
      <div class="label">Stale Cases</div>
      <div class="value" id="kv-stale">—</div>
      <div class="sub" id="ks-stale">no activity past threshold</div>
    </div>
    <div class="kpi" id="kpi-noliab">
      <div class="label">No Liability Set</div>
      <div class="value" id="kv-noliab">—</div>
      <div class="sub" id="ks-noliab">treating cases 31+ days</div>
    </div>
  </div>

  <!-- NEW INTAKES PANEL -->
  <div class="section-title">
    <div>
      <div class="accent-rule"></div>
      <h2>New Intakes</h2>
    </div>
    <span style="font-size:11.5px;color:var(--ink-4)" id="intakes-meta"></span>
  </div>
  <div class="panel">
    <div class="panel-head">
      <div style="display:flex;align-items:center;gap:10px">
        <h3>Recently Assigned Cases</h3>
        <div class="seg" id="window-seg" style="font-size:11px">
          <button class="on" data-days="7">7d</button>
          <button data-days="14">14d</button>
          <button data-days="30">30d</button>
        </div>
      </div>
      <div class="meta-r" id="intakes-count"></div>
    </div>
    <div id="intakes-body"><div class="loading">Loading…</div></div>
  </div>

  <!-- TREATING CASES PANEL -->
  <div class="section-title" style="margin-top:28px">
    <div>
      <div class="accent-rule" style="background:var(--indigo)"></div>
      <h2>Treating Cases</h2>
    </div>
    <div class="bucket-tabs" id="bucket-tabs">
      <button class="bucket-tab on" data-bucket="0">0–30 days<span class="bct" id="bc0"></span></button>
      <button class="bucket-tab" data-bucket="1">31–60 days<span class="bct" id="bc1"></span></button>
      <button class="bucket-tab" data-bucket="2">61–90 days<span class="bct" id="bc2"></span></button>
      <button class="bucket-tab" data-bucket="3">90+ days<span class="bct" id="bc3"></span></button>
    </div>
  </div>
  <div class="panel">
    <div class="panel-head">
      <h3 id="treating-panel-title">0–30 Days</h3>
      <div class="meta-r" id="treating-count"></div>
    </div>
    <div id="treating-body"><div class="loading">Loading…</div></div>
  </div>

</div><!-- /app -->

<script>
(function(){
'use strict';

var _RAILWAY = 'https://kal-ops-production.up.railway.app';
var _today = new Date(); _today.setHours(0,0,0,0);
var _cfg = { assignWindow: 7, staleThreshold: 14 };
var _activeBucket = 0;

// ── Raw data ─────────────────────────────────────────
var _raw = { treating: [], notes: [], settlement: [], demands: [] };
var _juniorCache = {};

// ── Derived maps ─────────────────────────────────────
var _notesMap = {};   // casename → { count, cats: Set }
var _solMap = {};     // casename → Date

// ── Dropdown options ─────────────────────────────────
var _LIABILITY_OPTS = ['','Pending','Under Investigation','Accepted','Comparative Fault','Denied','No Coverage'];
var _HI_OPTS        = ['','None','Private','Medicare','Medi-Cal','Kaiser','ERISA / Employer','MedPay Only'];
var _POLICY_OPTS    = ['','Uninsured / Prop 213','15/30','30/60','50/100','100/300','250/500','250k–1M','1M+'];
var _UIM_OPTS       = ['','None','15/30','30/60','50/100','100/300','250/500','250k–1M','1M+'];

// ── Policy limit ranking (for stacking calc) ─────────
var _POLICY_RANK = {'15/30':1,'30/60':2,'50/100':3,'100/300':4,'250/500':5,'250k–1M':6,'1M+':7};

// ── Helpers ───────────────────────────────────────────
function _parseDate(s){
  if(!s||typeof s!=='string') return null;
  var p=s.trim().split('/');
  if(p.length!==3) return null;
  var d=new Date(parseInt(p[2]),parseInt(p[0])-1,parseInt(p[1]));
  d.setHours(0,0,0,0);
  return isNaN(d.getTime())?null:d;
}
function _daysAgo(dateStr){
  var d=_parseDate(dateStr); if(!d) return null;
  return Math.floor((_today-d)/86400000);
}
function _daysUntil(dateStr){
  var d=_parseDate(dateStr); if(!d) return null;
  return Math.floor((d-_today)/86400000);
}
function _fmtMoney(v){
  var n=parseFloat(v)||0;
  if(n===0) return '—';
  if(n>=1000) return '$'+Math.round(n/1000)+'k';
  return '$'+Math.round(n);
}
function _esc(s){
  var d=document.createElement('div');
  d.appendChild(document.createTextNode(String(s||'')));
  return d.innerHTML;
}
function _daysAgoHtml(n, threshold){
  if(n===null||n===undefined) return '<span style="color:var(--ink-4)">—</span>';
  var cls = n>=threshold?'stale':n>=(threshold*0.7)?'warn':'';
  return '<span class="days-ago '+cls+'">'+(n===0?'Today':n+'d ago')+'</span>';
}

// ── Railway: junior fields ────────────────────────────
function _loadJuniorFields(){
  return fetch(_RAILWAY+'/junior')
    .then(function(r){return r.json();})
    .then(function(d){ _juniorCache=d||{}; })
    .catch(function(){ _juniorCache={}; });
}
function _setJuniorField(caseName, field, value){
  if(!_juniorCache[caseName]) _juniorCache[caseName]={};
  _juniorCache[caseName][field]=value;
  var body={caseName:caseName};
  body[field]=value;
  fetch(_RAILWAY+'/junior',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  }).catch(function(){});
}
function _getJunior(caseName){ return _juniorCache[caseName]||{}; }

// ── fetchAll ──────────────────────────────────────────
async function fetchAll(url){
  var all=[],page=1,hasMore=true;
  while(hasMore){
    var sep=url.includes('?')?'&':'?';
    var r=await fetch(url+sep+'page='+page,{credentials:'include'}).then(function(r){return r.json();});
    if(r.results) all=all.concat(r.results);
    hasMore=!!r.next; page++;
    if(page>60) break;
  }
  return all;
}

// ── Build notes map ───────────────────────────────────
function _buildNotesMap(notes){
  var map={};
  notes.forEach(function(n){
    var cn=n.casename||'';
    if(!map[cn]) map[cn]={count:0,cats:{}};
    map[cn].count++;
    if(n.category) map[cn].cats[n.category]=true;
  });
  return map;
}

// ── Build SOL map ─────────────────────────────────────
function _buildSolMap(settlement){
  var map={};
  settlement.forEach(function(r){
    if(r._casename && r.statutedate) map[r._casename]=r.statutedate;
  });
  return map;
}

// ── Bucket helper ─────────────────────────────────────
function _bucket(age){
  if(age<=30) return 0;
  if(age<=60) return 1;
  if(age<=90) return 2;
  return 3;
}
var _BUCKET_LABELS=['0–30 Days','31–60 Days','61–90 Days','90+ Days'];

// ── Stacking check ────────────────────────────────────
function _stackingOpportunity(policy3p, uim){
  if(!policy3p||!uim||uim==='None') return false;
  var pr=_POLICY_RANK[policy3p]||0;
  var ur=_POLICY_RANK[uim]||0;
  return ur>pr && pr>0 && ur>0;
}

// ── Dropdown renderer ─────────────────────────────────
function _dropHtml(caseName, field, opts, label){
  var cur=_getJunior(caseName)[field]||'';
  var setClass=cur?'set':'';
  var html='<select class="jdrop '+setClass+'" data-case="'+_esc(caseName)+'" data-field="'+field+'" data-val="'+_esc(cur)+'"'
    +' title="'+label+'" onchange="__jDropChange(this)">';
  opts.forEach(function(o){
    html+='<option value="'+_esc(o)+'"'+(o===cur?' selected':'')+'>'+(_esc(o)||'— '+label+' —')+'</option>';
  });
  html+='</select>';
  return html;
}

// Global dropdown change handler
window.__jDropChange=function(el){
  var cn=el.getAttribute('data-case');
  var field=el.getAttribute('data-field');
  var val=el.value;
  el.setAttribute('data-val',val);
  el.className='jdrop'+(val?' set':'');
  _setJuniorField(cn,field,val||null);
  _updateKPIs();
};

// ── Notes pill ────────────────────────────────────────
function _notesPill(caseName){
  var nm=_notesMap[caseName]||{count:0};
  var cls=nm.count>0?'notes-pill has':'notes-pill';
  return '<span class="'+cls+'">'+nm.count+'</span>';
}

// ── Flag builder ──────────────────────────────────────
function _buildFlags(t, bucket, jf){
  var flags=[];
  var touched=_daysAgo(t.last_touched);
  var age=_daysAgo(t.retainref_date)||0;

  if(touched!==null && touched>=_cfg.staleThreshold)
    flags.push('<span class="flag red">Stale '+touched+'d</span>');

  if(bucket>0 && (!jf.liability||jf.liability===''))
    flags.push('<span class="flag amber">No Liability</span>');

  if(bucket>=1 && (parseFloat(t.total_meds)||0)===0)
    flags.push('<span class="flag red">No Specials</span>');

  if(bucket>=1){
    var s=parseFloat(t.total_meds)||0;
    var low=(bucket===1 && s>0 && s<1000)||(bucket===2 && s>0 && s<2500);
    if(low) flags.push('<span class="flag amber">Low Specials</span>');
  }

  if(bucket>=1 && _stackingOpportunity(jf.policy3p,jf.uim))
    flags.push('<span class="flag indigo">UIM Stack</span>');

  if(bucket===3){
    var sol=_solMap[t._casename];
    if(sol){
      var du=_daysUntil(sol);
      if(du!==null && du<=365)
        flags.push('<span class="flag red">SOL '+(du<0?'PAST':du+'d')+'</span>');
      else if(du!==null && du<=180)
        flags.push('<span class="flag amber">SOL '+du+'d</span>');
    }
  }
  return flags;
}

// ── Render New Intakes ────────────────────────────────
function _renderNewIntakes(){
  var win=_cfg.assignWindow;
  var rows=_raw.treating.filter(function(t){
    if(!t.retainref_date) return false;
    var d=_daysAgo(t.retainref_date);
    return d!==null && d<=win;
  });

  document.getElementById('intakes-count').textContent=rows.length+' cases';
  document.getElementById('kv-intakes').textContent=rows.length;
  document.getElementById('ks-intakes').textContent='retained in past '+win+' days';

  if(!rows.length){
    document.getElementById('intakes-body').innerHTML='<div class="empty">No cases retained in the past '+win+' days.</div>';
    return;
  }

  rows.sort(function(a,b){ return (_daysAgo(b.retainref_date)||0)-(_daysAgo(a.retainref_date)||0); });

  var html='<table class="t"><thead><tr>'
    +'<th>Case</th>'
    +'<th>Assigned</th>'
    +'<th>Liability</th>'
    +'<th>Health Ins.</th>'
    +'<th class="num">Notes</th>'
    +'<th>Last Touched</th>'
    +'<th>3P Policy</th>'
    +'<th>UIM</th>'
    +'<th>Flags</th>'
    +'</tr></thead><tbody>';

  rows.forEach(function(t){
    var jf=_getJunior(t._casename);
    var assigned=_daysAgo(t.retainref_date);
    var touched=_daysAgo(t.last_touched);
    var flags=_buildFlags(t,0,jf);
    var rowClass=flags.length>0&&flags.some(function(f){return f.indexOf('flag red')>=0;})?'row-alert'
      :flags.length>0?'row-warn':'';

    html+='<tr class="'+rowClass+'">'
      +'<td><div class="case-cell"><div class="case-name">'+_esc(t._casename.split(' - ')[0])+'</div>'
      +'<div class="case-cm">'+_esc(t.case_manager||'Unassigned')+(t.casetype?' · '+_esc(t.casetype):'')+'</div></div></td>'
      +'<td>'+_daysAgoHtml(assigned,win)+'</td>'
      +'<td>'+_dropHtml(t._casename,'liability',_LIABILITY_OPTS,'Liability')+'</td>'
      +'<td>'+_dropHtml(t._casename,'healthInsurance',_HI_OPTS,'Health Insurance')+'</td>'
      +'<td class="num">'+_notesPill(t._casename)+'</td>'
      +'<td>'+_daysAgoHtml(touched,_cfg.staleThreshold)+'</td>'
      +'<td>'+_dropHtml(t._casename,'policy3p',_POLICY_OPTS,'3P Policy')+'</td>'
      +'<td>'+_dropHtml(t._casename,'uim',_UIM_OPTS,'UIM')+'</td>'
      +'<td class="flagcol"><div class="stack">'+flags.join('')+'</div></td>'
      +'</tr>';
  });
  html+='</tbody></table>';
  document.getElementById('intakes-body').innerHTML=html;
}

// ── Render Treating ───────────────────────────────────
function _renderTreating(bucketIdx){
  _activeBucket=bucketIdx;
  var rows=_raw.treating.filter(function(t){
    if(t.casestatus!=='Treating') return false;
    var d=_daysAgo(t.retainref_date);
    return d!==null && _bucket(d)===bucketIdx;
  });

  // Update bucket tab counts
  [0,1,2,3].forEach(function(b){
    var n=_raw.treating.filter(function(t){
      if(t.casestatus!=='Treating') return false;
      var d=_daysAgo(t.retainref_date);
      return d!==null && _bucket(d)===b;
    }).length;
    var el=document.getElementById('bc'+b);
    if(el) el.textContent=n?' ('+n+')':'';
  });

  document.getElementById('treating-panel-title').textContent=_BUCKET_LABELS[bucketIdx];
  document.getElementById('treating-count').textContent=rows.length+' cases';

  if(!rows.length){
    document.getElementById('treating-body').innerHTML='<div class="empty">No treating cases in this bucket.</div>';
    return;
  }

  rows.sort(function(a,b){ return (_daysAgo(b.retainref_date)||0)-(_daysAgo(a.retainref_date)||0); });

  // Column sets vary by bucket
  var showHI      = bucketIdx===0;
  var showPolicy  = bucketIdx>=1;
  var showUIM     = bucketIdx>=1;
  var showSol     = bucketIdx===3;

  var html='<table class="t"><thead><tr>'
    +'<th>Case</th>'
    +'<th class="num">Age</th>'
    +'<th class="num">Specials</th>'
    +'<th>Last Touched</th>'
    +'<th class="num">Notes</th>'
    +'<th>Liability</th>'
    +(showHI ? '<th>Health Ins.</th>' : '')
    +(showPolicy ? '<th>3P Policy</th>' : '')
    +(showUIM ? '<th>UIM</th>' : '')
    +(showSol ? '<th>SOL</th>' : '')
    +'<th>Flags</th>'
    +'</tr></thead><tbody>';

  rows.forEach(function(t){
    var jf=_getJunior(t._casename);
    var touched=_daysAgo(t.last_touched);
    var specials=parseFloat(t.total_meds)||0;
    var flags=_buildFlags(t,bucketIdx,jf);
    var rowClass=flags.length>0&&flags.some(function(f){return f.indexOf('flag red')>=0;})?'row-alert'
      :flags.length>0?'row-warn':'';

    var solHtml='';
    if(showSol){
      var solDate=_solMap[t._casename];
      if(solDate){
        var du=_daysUntil(solDate);
        var solCls=du!==null&&du<=180?'color:var(--red);font-weight:600'
          :du!==null&&du<=365?'color:var(--amber)':'color:var(--ink-3)';
        solHtml='<span style="font-family:var(--num);font-size:11.5px;'+solCls+'">'
          +(du===null?'—':du<0?'PAST':du+'d')+'</span>';
      } else { solHtml='<span style="color:var(--ink-4)">—</span>'; }
    }

    html+='<tr class="'+rowClass+'">'
      +'<td><div class="case-cell"><div class="case-name">'+_esc(t._casename.split(' - ')[0])+'</div>'
      +'<div class="case-cm">'+_esc(t.case_manager||'Unassigned')+(t.casetype?' · '+_esc(t.casetype):'')+'</div></div></td>'
      +'<td class="num" style="font-family:var(--num);font-weight:600">'+(_daysAgo(t.retainref_date)!==null?_daysAgo(t.retainref_date)+'d':'—')+'</td>
      +'<td class="num">'+_fmtMoney(specials)+'</td>'
      +'<td>'+_daysAgoHtml(touched,_cfg.staleThreshold)+'</td>'
      +'<td class="num">'+_notesPill(t._casename)+'</td>'
      +'<td>'+_dropHtml(t._casename,'liability',_LIABILITY_OPTS,'Liability')+'</td>'
      +(showHI?'<td>'+_dropHtml(t._casename,'healthInsurance',_HI_OPTS,'Health Ins.')+'</td>':'')
      +(showPolicy?'<td>'+_dropHtml(t._casename,'policy3p',_POLICY_OPTS,'3P Policy')+'</td>':'')
      +(showUIM?'<td>'+_dropHtml(t._casename,'uim',_UIM_OPTS,'UIM')+'</td>':'')
      +(showSol?'<td>'+solHtml+'</td>':'')
      +'<td class="flagcol"><div class="stack">'+flags.join('')+'</div></td>'
      +'</tr>';
  });
  html+='</tbody></table>';
  document.getElementById('treating-body').innerHTML=html;
}

// ── KPIs ──────────────────────────────────────────────
function _updateKPIs(){
  var win=_cfg.assignWindow;
  var intakeRows=_raw.treating.filter(function(t){
    if(!t.retainref_date) return false;
    var d=_daysAgo(t.retainref_date);
    return d!==null && d<=win;
  });
  var treatingRows=_raw.treating.filter(function(t){
    return t.casestatus==='Treating' && _daysAgo(t.retainref_date)!==null;
  });
  var staleRows=treatingRows.filter(function(t){
    var d=_daysAgo(t.last_touched);
    return d!==null && d>=_cfg.staleThreshold;
  });
  var noLiabRows=treatingRows.filter(function(t){
    var age=_daysAgo(t.retainref_date)||0;
    if(age<=30) return false;
    var jf=_getJunior(t._casename);
    return !jf.liability||jf.liability==='';
  });

  document.getElementById('kv-intakes').textContent=intakeRows.length;
  document.getElementById('kv-treating').textContent=treatingRows.length;
  document.getElementById('kv-stale').textContent=staleRows.length;
  document.getElementById('kv-noliab').textContent=noLiabRows.length;

  var staleKpi=document.getElementById('kpi-stale');
  staleKpi.className='kpi'+(staleRows.length>0?' warn':'');
  var noliabKpi=document.getElementById('kpi-noliab');
  noliabKpi.className='kpi'+(noLiabRows.length>5?' warn':noLiabRows.length>0?'':' good');

  // Briefing bar
  var items=[];
  if(staleRows.length) items.push('<div class="b-item amber"><span class="b-marker">'+staleRows.length+'</span><span>cases stale '+_cfg.staleThreshold+'+ days</span></div>');
  if(noLiabRows.length) items.push('<div class="b-item amber"><span class="b-marker">'+noLiabRows.length+'</span><span>31+ day cases missing liability status</span></div>');

  var stackCount=treatingRows.filter(function(t){
    var jf=_getJunior(t._casename);
    return _stackingOpportunity(jf.policy3p,jf.uim);
  }).length;
  if(stackCount) items.push('<div class="b-item indigo"><span class="b-marker">'+stackCount+'</span><span>potential UIM stacking opportunities</span></div>');

  var noSpecials=treatingRows.filter(function(t){var d=_daysAgo(t.retainref_date)||0;return d>30&&(parseFloat(t.total_meds)||0)===0;}).length;
  if(noSpecials) items.push('<div class="b-item red"><span class="b-marker">'+noSpecials+'</span><span>31+ day cases with no specials</span></div>');

  var bar=document.getElementById('briefing-bar');
  var itemsEl=document.getElementById('briefing-items');
  itemsEl.innerHTML=items.join('');
  bar.style.display=items.length?'flex':'none';
}

// ── Controls wiring ───────────────────────────────────
document.getElementById('window-seg').addEventListener('click',function(e){
  var btn=e.target.closest('button[data-days]'); if(!btn) return;
  document.querySelectorAll('#window-seg button').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  _cfg.assignWindow=parseInt(btn.getAttribute('data-days'));
  _renderNewIntakes();
  _updateKPIs();
});

document.getElementById('stale-seg').addEventListener('click',function(e){
  var btn=e.target.closest('button[data-stale]'); if(!btn) return;
  document.querySelectorAll('#stale-seg button').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  _cfg.staleThreshold=parseInt(btn.getAttribute('data-stale'));
  _renderNewIntakes();
  _renderTreating(_activeBucket);
  _updateKPIs();
});

document.getElementById('bucket-tabs').addEventListener('click',function(e){
  var btn=e.target.closest('button[data-bucket]'); if(!btn) return;
  document.querySelectorAll('.bucket-tab').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  _renderTreating(parseInt(btn.getAttribute('data-bucket')));
});

// ── Init ──────────────────────────────────────────────
async function init(){
  document.getElementById('last-updated').textContent='Loading data…';

  // Check we're on CasePeer
  if(window.location.hostname.indexOf('casepeer')<0){
    document.getElementById('intakes-body').innerHTML='<div class="empty" style="color:var(--red)">⚠️ Must be opened from my.casepeer.com</div>';
    document.getElementById('treating-body').innerHTML='';
    document.getElementById('last-updated').textContent='Not on CasePeer';
    return;
  }

  try {
    // Parallel: CasePeer + Railway
    var [treating, notes, settlement, juniorFields] = await Promise.all([
      fetchAll('/api/v1/case/treating-overview/'),
      fetchAll('/api/v1/case/notes/'),
      fetchAll('/api/v1/case/settlement-overview/'),
      _loadJuniorFields()
    ]);

    _raw.treating   = treating;
    _raw.notes      = notes;
    _raw.settlement = settlement;

    _notesMap = _buildNotesMap(notes);
    _solMap   = _buildSolMap(settlement);

    var now = new Date();
    document.getElementById('last-updated').textContent =
      'Updated ' + now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});

    _updateKPIs();
    _renderNewIntakes();
    _renderTreating(0);

    // Bucket counts
    [0,1,2,3].forEach(function(b){
      var n=treating.filter(function(t){
        if(t.casestatus!=='Treating') return false;
        var d=_daysAgo(t.retainref_date);
        return d!==null && _bucket(d)===b;
      }).length;
      var el=document.getElementById('bc'+b);
      if(el) el.textContent=n?' ('+n+')':'';
    });

  } catch(err){
    var msg=(err&&err.message)||'Unknown error';
    document.getElementById('intakes-body').innerHTML='<div class="empty" style="color:var(--red)">Error: '+_esc(msg)+'</div>';
    document.getElementById('treating-body').innerHTML='';
    document.getElementById('last-updated').textContent='Load error';
    console.error('[Case Care]',err);
  }
}

if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init);
else init();

})();
</script>
